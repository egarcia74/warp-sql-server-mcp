name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check if this is a release version bump
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

          # Only publish if a matching release tag exists
          if ! git rev-parse "v$PKG_VERSION" >/dev/null 2>&1; then
            echo "No tag v$PKG_VERSION found — skipping (not a release bump)"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if already published to avoid overwrite errors
          if npm view "@egarcia74/warp-sql-server-mcp@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "v$PKG_VERSION already on npm — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "Will publish @egarcia74/warp-sql-server-mcp@$PKG_VERSION"

      - name: Run tests
        if: steps.check.outputs.should_publish == 'true'
        run: npm run test:unit

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: steps.check.outputs.should_publish == 'true'
        env:
          PKG_VERSION: ${{ steps.check.outputs.version }}
        run: |
          echo "## Published @egarcia74/warp-sql-server-mcp@${PKG_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "https://www.npmjs.com/package/@egarcia74/warp-sql-server-mcp/v/${PKG_VERSION}" \
            >> "$GITHUB_STEP_SUMMARY"
